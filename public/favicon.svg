<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- SENIC green rounded square -->
  <rect width="32" height="32" rx="6" fill="#1BAE70"/>
  <!-- Center hub — the project core -->
  <circle cx="16" cy="16" r="3" fill="white"/>
  <!-- Three radiating arrows at 120° intervals — C, D, E spreading impact -->
  <!-- Communication: top (spreading the word) -->
  <line x1="16" y1="12" x2="16" y2="5.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="12.5,8.5 16,5 19.5,8.5" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dissemination: bottom-right (reaching audiences) -->
  <line x1="19" y1="18" x2="24.5" y2="23.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="24.5,20 25,24 21,23.5" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Exploitation: bottom-left (capturing value) -->
  <line x1="13" y1="18" x2="7.5" y2="23.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="7.5,20 7,24 11,23.5" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
